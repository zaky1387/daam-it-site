<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL-DAAM ICT</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:white;
}
.nav img {
  height:60px;
}
.nav a {
  margin-left:20px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
}

/* HERO */
.hero {
  background:linear-gradient(to right,#0078D7,#00b4db);
  color:white;
  text-align:center;
  padding:100px;
}

/* SECTION */
.section {
  padding:60px;
  text-align:center;
}

/* SERVICES */
.services {
  display:flex;
  justify-content:center;
  gap:20px;
}
.card {
  padding:20px;
  background:white;
  border-radius:10px;
  width:200px;
}

/* CONTACT */
.contact {
  background:#0a2540;
  color:white;
  padding:50px;
}

/* FOOTER */
.footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>
