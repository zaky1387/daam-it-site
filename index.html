<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL-DAAM ICT | IT Solutions</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f7fa;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#0a2540;
  color:white;
}
.nav img {
  height:60px;
}
.nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero {
  background:linear-gradient(to right,#0078D7,#00b4db);
  color:white;
  padding:100px 20px;
  text-align:center;
}
.hero h1 {
  font-size:50px;
}
.hero button {
  padding:12px 25px;
  margin-top:20px;
  border:none;
  background:#25D366;
  color:white;
  cursor:pointer;
}

/* SECTION */
.section {
  padding:60px 20px;
  text-align:center;
}

/* SERVICES */
.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}
.card {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover {
  transform: translateY(-10px);
}

/* CONTACT */
.contact {
  background:#0a2540;
  color:white;
  padding:60px 20px;
}

/* FOOTER */
.footer {
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
